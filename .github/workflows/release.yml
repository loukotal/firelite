name: Build & Publish

on:
  release:
    types: [created]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test
        run: cargo test --workspace

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish firelite
        run: cargo publish --package firelite --token "${CRATES_TOKEN}"
        env:
          CRATES_TOKEN: ${{ secrets.CRATES_TOKEN }}

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            binary: firelite.exe
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive_ext: tar.gz
            binary: firelite
          - target: x86_64-apple-darwin
            os: macos-latest
            archive_ext: zip
            binary: firelite
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build release binary
        run: cargo build --package firelite --release --target "${{ matrix.target }}"
      - name: Package Unix artifact
        if: runner.os != 'Windows'
        id: package-unix
        shell: bash
        run: |
          archive="firelite-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p "${archive}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "${archive}/"
          cp README.md LICENSE "${archive}/"
          if [[ "${{ matrix.archive_ext }}" == "zip" ]]; then
            zip -r "${archive}.zip" "${archive}"
            echo "artifact=${archive}.zip" >> "${GITHUB_OUTPUT}"
          else
            tar -czf "${archive}.tar.gz" "${archive}"
            echo "artifact=${archive}.tar.gz" >> "${GITHUB_OUTPUT}"
          fi
      - name: Package Windows artifact
        if: runner.os == 'Windows'
        id: package-windows
        shell: pwsh
        run: |
          $archive = "firelite-$env:GITHUB_REF_NAME-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $archive | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\${{ matrix.binary }}" "$archive\"
          Copy-Item README.md, LICENSE "$archive\"
          Compress-Archive -Path "$archive\*" -DestinationPath "$archive.zip" -Force
          "artifact=$archive.zip" >> $env:GITHUB_OUTPUT
      - name: Upload release artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          artifact="${{ steps.package-unix.outputs.artifact }}${{ steps.package-windows.outputs.artifact }}"
          gh release upload "${GITHUB_REF_NAME}" "${artifact}" --repo "${GITHUB_REPOSITORY}" --clobber
